<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .pdf-container{
            position: absolute;
            top: 0;
            left:1.8em;
            right: 1.8em;
            width: 90vw;
            height: 80vh;
            margin: 0.5em;
             background-image: radial-gradient(blue, black);
           /* background-color: black;*/
            border: 2px solid red;
            overflow: hidden;
            z-index: 300;
        }
        .iframe-container{
            width: 100%;
            height: 100%;
            margin: 1.5em;
            border: 2px solid rgb(192, 215, 14);
            overflow: auto;
        }

        iframe{
            position: relative;
            z-index: 100;
            margin: 1.5em;
            width: 50vw;
            border: 2px solid rgb(86, 11, 226);
           /* background-image: radial-gradient(blue, black);*/
            overflow: scroll;
        }
    </style>

</head>
<body>
        <div class="pdf-container">
            <div class="close-html" onclick="EduHTML_Manager.close()">X</div>
            <div class="iframe-container">
                <iframe src="media/pdf/Data_Sheets/AT28C16.pdf" zoom="initial-scale" scrolling="yes" title="pdf file" width="100%" height="1000" loading="lazy">
            </div>
        </div>
</body>
</html>
